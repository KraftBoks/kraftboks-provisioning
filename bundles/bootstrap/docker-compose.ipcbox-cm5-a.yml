# IPCBOX-CM5-A has four RS485 channels. The stable aliases are created by the
# host hardware profile; Node-RED remains unprivileged.
services:
  nodered:
    group_add:
      - "20"
    devices:
      - /dev/ttyAMA0:/dev/ttyAMA0
      - /dev/ttyAMA2:/dev/ttyAMA2
      - /dev/ttyAMA3:/dev/ttyAMA3
      - /dev/ttyAMA4:/dev/ttyAMA4
    volumes:
      - /opt/kraftboks/data/nodered:/data
      - /dev/serial/by-id:/dev/serial/by-id
      - /run/kraftboks:/run/kraftboks
      - ./nodered/kb-ipcbox-io-client.js:/usr/local/bin/kb-ipcbox-io-client.js:ro
